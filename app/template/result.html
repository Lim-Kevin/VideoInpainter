<!doctype html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='result.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='video_base.css') }}">
    <title>Inpainter</title>
</head>
<body>
<h1>Draw</h1>
<div id="video_player">
    <div id="canvas_container">
        <img id="slideshow" src="{{url_for('get_frame', num=0)}}"/>
    </div>
    <div id="seekbar">
        <input type="range" id="slider" min="0" max="{{num_frames-1}}" value="0" list="markers"/>
        <datalist id="markers"></datalist>
    </div>
    <div id="controls">
        <button id="play_button">Play/Pause</button>
        <form id="save_button_form" action="/save_video" , method="POST">
            <button id="save_button">Save video</button>
        </form>
        <button id="again_button" onclick="again()">Inpaint again</button>
    </div>
</div>
<p id="frames_display">Frame: 1/{{num_frames}}</p>

<script src="{{url_for('static', filename='slideshow.js')}}"></script>
<script src="{{url_for('static', filename='result.js')}}" , fps="{{fps}}" , num_frames="{{num_frames}}"></script>
</body>
</html>
