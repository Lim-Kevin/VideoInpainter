<!doctype html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='mask.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='video_base.css') }}">
    <title>Inpainter</title>
</head>
<body>
<h1>Draw</h1>
<div id="video_player">
    <div id="canvas_container">
        <canvas class="overlay" id="cv1"></canvas>
        <img id="slideshow"/>
    </div>
    <!-- TODO: update button names -->
    <div id="seekbar">
        <input type="range" id="slider" min="0" max="{{num_frames-1}}" value="0" list="markers"/>
        <datalist id="markers"></datalist>
    </div>
    <div id="controls">
        <button id="play_button" onclick="play_or_pause()">Play/Pause</button>
        <button id="reset_button">Reset scribble</button>
        <button id="change_button">Change +/-</button>
        <button id="propagate_button" onclick="upload_drawing()">Propagate</button>
        <button id="inpaint_button" onclick="inpaint()">Inpaint</button>
    </div>
</div>
<p id="frames_display">Frame: 1/{{num_frames}}</p>

<script defer src="{{url_for('static', filename='mask.js')}}"></script>
<script src="{{url_for('static', filename='slideshow.js')}}" , fps="{{fps}}" , num_frames="{{num_frames}}"></script>
</body>
</html>
