<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="{{ url_for('static', filename='mask.css') }}">
    <title>Inpainter</title>
  </head>
  <body>
    <h1>Draw</h1>
    <div class="video_player">
      <div class="container">
        <canvas class="canvas" id="cv1"></canvas>
        <video class="video" id="vd1" onloadeddata="resize_canvas(this)">
          <source src="{{file_url}}" type="video/mp4">
        </video>
      </div>
      <div class="timeline">
        <div class="timeline_drag"></div>
        <span class="timeline_progress"></span>
      </div>
      <div class="controls">
        <button id="play-button" onclick="play_or_pause()" type="button">Play/Pause</button>
        <button id="save-button" onclick="save()" type="button">Save Mask</button>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/latest/TweenMax.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/latest/utils/Draggable.min.js"></script>
    <script defer src="{{url_for('static', filename='mask.js')}}"></script>
  </body>
</html>
