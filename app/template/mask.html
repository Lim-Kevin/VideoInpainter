<!doctype html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='mask.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='video_base.css') }}">
    <title>Inpainter</title>
</head>
<body>
<h1>Draw</h1>
<div id="video_player">
    <div id="canvas_container">
        <canvas class="overlay" id="cv1" oncontextmenu="return false"></canvas>
        <img id="slideshow"/>
        <img class="overlay" id="mask" />
    </div>
    <!-- TODO: update button names -->
    <div id="seekbar">
        <input type="range" id="slider" min="0" max="{{num_frames-1}}" value="0" list="markers"/>
        <datalist id="markers"></datalist>
    </div>
    <div id="controls">
        <button id="play_button">Play/Pause</button>
        <button id="reset_button">Reset scribble</button>
        <button id="change_button">Change +/-</button>
        <button id="propagate_button" onclick="propagate()">Propagate</button>
    </div>
</div>
<p id="frames_display">Frame: 1/{{num_frames}}</p>
<script src="{{url_for('static', filename='slideshow.js')}}"></script>
<script src="{{url_for('static', filename='mask.js')}}", fps="{{fps}}" , num_frames="{{num_frames}}"></script>
</body>
</html>
